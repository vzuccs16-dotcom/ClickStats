<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMP Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo-block">
        <span class="logo-crown">◆</span>
        <h1>SMP Leaderboard</h1>
      </div>
      <div class="header-meta">
        <span class="update-pill" id="update-status">Loading...</span>
        <button class="refresh-btn" id="refresh-btn" title="Refresh now">↺ Refresh</button>
      </div>
    </div>

    <nav class="tab-nav">
      <button class="tab active" data-tab="overall">Overall</button>
      <button class="tab" data-tab="subscribers">Subscribers</button>
      <button class="tab" data-tab="views">Views</button>
      <button class="tab" data-tab="videos">Videos</button>
      <button class="tab" data-tab="age">Channel Age</button>
      <button class="tab" data-tab="compare">Compare</button>
    </nav>
  </header>

  <main>
    <div id="leaderboard-section">
      <div class="podium-row" id="podium-row"></div>
      <section class="board-section">
        <table class="leaderboard" id="leaderboard-table">
          <thead><tr id="table-head"></tr></thead>
          <tbody id="leaderboard-body">
            <tr><td colspan="6" class="loading-cell">Fetching channel data...</td></tr>
          </tbody>
        </table>
      </section>
    </div>

    <div id="compare-section" style="display:none">
      <div class="compare-controls">
        <select id="compare-select-a" class="compare-select"></select>
        <span class="compare-controls-vs">VS</span>
        <select id="compare-select-b" class="compare-select"></select>
      </div>
      <div id="compare-content"></div>
    </div>
  </main>

  <footer>
    <p>Data via YouTube Data API v3 &mdash; refreshes every 5 minutes</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
